experiment: wav2vec2_finetune_1h
model_name_or_path: facebook/wav2vec2-base
train_manifest: data/manifests/train_1h.jsonl
eval_manifest: data/manifests/dev_clean.jsonl
output_dir: exp/wav2vec2_finetune_1h
freeze_encoder: false
freeze_feature_encoder: true
ctc_loss_reduction: mean
ctc_zero_infinity: true

# 184 utterances remain after the 15-second filter. With gradient
# accumulation 16, 1000 optimizer steps correspond to about 84 epochs.
max_duration_in_seconds: 15
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
max_steps: 1000
eval_steps: 100
learning_rate: 1.0e-4
weight_decay: 0.005
warmup_ratio: 0.1
fp16: true
gradient_checkpointing: true
save_total_limit: 2
eval_accumulation_steps: 10
seed: 42
